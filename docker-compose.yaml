services:
  pos_api:
   build: .
   container_name: pos_backend
   ports:
    - "8000:80"
   networks:
    - my_net
   depends_on:
     my_postgres:
       condition: service_healthy
   restart: on-failure

  my_postgres:
   image: postgres
   container_name: pos_postgres
   environment:
    POSTGRES_USER: postgres
    POSTGRES_PASSWORD: Nazo
    POSTGRES_DB: flaskapi
   ports:
    - "5142:5432"
   networks:
    - my_net
   healthcheck:
     test: ["CMD-SHELL", "pg_isready -U postgres"]
     interval: 5s
     timeout: 5s
     retries: 5
     
networks:
   my_net:
    driver: bridge